name: Bug report
description: Report a reproducible reader, audit, comparison, or report defect
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Use synthetic data only. Do not attach private datasets or matched sensitive values.
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: Commit SHA or release tag
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - CSV reader
        - JSON reader
        - JSONL reader
        - Required-field checks
        - Duplicate detection
        - Pattern findings
        - Split comparison
        - JSON report
        - Markdown report
        - Documentation
    validations:
      required: true
  - type: textarea
    id: schema
    attributes:
      label: Dataset shape
      description: Describe fields, file format, and approximate record count without sharing private content.
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal synthetic fixture
      render: json
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Reproduction command
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS and Python version
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: The example is synthetic and contains no private information.
          required: true
        - label: I identified the exact commit or tested the latest main branch.
          required: true
